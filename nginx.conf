map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so nginx does not fail startup when the
    # backend container is temporarily offline; upstream is resolved per
    # request via the $upstream_api variable below.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # REST API
    location /api/ {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SignalR hubs — needs WebSocket upgrade + long idle timeout.
    location /hubs/ {
        set $upstream_hub http://api:8080;
        proxy_pass $upstream_hub$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Hashed static assets — long cache (Angular production uses outputHashing: 'all').
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # index.html must not be cached so deploys pick up new hashes.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
